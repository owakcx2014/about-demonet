<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>About D3M0N3T v5.4</title>
    <style>
        /* تنسيق الخلفية والألوان العامة */
        body {
            background-color: #0f0f0f; /* أسود داكن جداً */
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* تنسيق شعار D5 */
        .logo-container {
            position: relative;
            margin-bottom: 20px;
        }

        .logo {
            width: 180px; /* حجم الشعار */
            height: 180px;
            border-radius: 30px; /* زوايا منحنية */
            box-shadow: 0 0 30px rgba(138, 43, 226, 0.6); /* توهج بنفسجي */
            border: 2px solid #8a2be2;
            transition: transform 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.05);
        }

        /* النصوص */
        h1 {
            color: #a020f0;
            font-size: 2.5em;
            margin: 10px 0;
            text-shadow: 2px 2px 10px rgba(160, 32, 240, 0.5);
        }

        .version {
            color: #888;
            font-size: 1em;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .description {
            max-width: 500px;
            line-height: 1.6;
            color: #ccc;
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 15px;
            border-right: 4px solid #8a2be2;
            text-align: center;
        }

        /* تذييل الصفحة وحقوق النشر */
        .footer {
            margin-top: 30px;
            text-align: center;
            font-size: 0.85em;
            color: #666;
        }

        .copyright-text {
            color: #8a2be2;
            font-weight: bold;
        }

        .btn {
            margin-top: 20px;
            padding: 12px 30px;
            background-color: #8a2be2;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
            transition: background 0.3s;
        }

        .btn:hover {
            background-color: #a020f0;
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="D5.png" alt="D3M0N3T Logo" class="logo">
    </div>

    <h1>D3M0N3T PROJECT</h1>
    <div class="version">إصدار 5.4</div>

    <div class="description">

    </div>

</html>
